name: Synapse Scripts Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'synapse/notebooks/**'
  workflow_dispatch:

jobs:
  test:
    name: Run PySpark Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyspark pytest pytest-cov

      - name: Run unit tests
        run: |
          python -m pytest synapse/tests/ -v --cov=synapse --cov-report=term-missing

  deploy:
    name: Upload PySpark Scripts to ADLS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      - name: Upload PySpark Scripts to ADLS
        run: |
          for file in synapse/notebooks/*.py; do
            script_name=$(basename "$file")
            echo "Uploading script: $script_name"
            az storage blob upload \
              --account-name "stukhkpropdev" \
              --container-name "config" \
              --name "scripts/$script_name" \
              --file "$file" \
              --auth-mode login \
              --overwrite true
          done

      - name: Verify Upload
        run: |
          az storage blob list \
            --account-name "stukhkpropdev" \
            --container-name "config" \
            --prefix "scripts/" \
            --auth-mode login \
            --output table
