name: Streamlit Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'streamlit/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy Streamlit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      - name: Login to ACR
        run: |
          az acr login --name acrukhkpropdev

      - name: Build and Push Docker Image
        run: |
          cd streamlit
          docker build -t acrukhkpropdev.azurecr.io/streamlit:latest .
          docker push acrukhkpropdev.azurecr.io/streamlit:latest

      - name: Get ACR Credentials
        id: acr-creds
        run: |
          ACR_USERNAME=$(az acr credential show --name acrukhkpropdev --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name acrukhkpropdev --query passwords[0].value -o tsv)
          echo "acr_username=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "acr_password=$ACR_PASSWORD" >> $GITHUB_OUTPUT

      - name: Update Container App
        run: |
          az containerapp update \
            --name ca-ukhkprop-streamlit-dev \
            --resource-group rg-ukhkprop-dev \
            --image acrukhkpropdev.azurecr.io/streamlit:latest \
            --set-env-vars STORAGE_ACCOUNT=stukhkpropdev \
            --registry-server acrukhkpropdev.azurecr.io \
            --registry-username ${{ steps.acr-creds.outputs.acr_username }} \
            --registry-password ${{ steps.acr-creds.outputs.acr_password }}
